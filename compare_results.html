<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>BioAudit — Delta Analysis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
  <style>.panel-hidden { display: none; } .tab-active { background: #6366f1; color: white; } .tab-inactive { background: transparent; color: #64748b; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <header class="bg-white border-b border-slate-100 px-6 py-4 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-indigo-600 rounded-xl flex items-center justify-center"><i class="fa-solid fa-dna text-white"></i></div>
        <span class="font-semibold text-lg">BioAudit / Delta Analysis</span>
      </div>
      <a href="protocol.html" class="bg-indigo-600 text-white text-sm font-semibold px-5 py-2.5 rounded-xl shadow-[0_4px_12px_rgba(99,102,241,0.3)]">
        View Updated Protocol <i class="fa-solid fa-arrow-right text-xs ml-1"></i>
      </a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-10">
      <div class="bg-white rounded-3xl border border-emerald-100 shadow-sm p-6">
        <p class="text-sm text-slate-500 font-medium">Markers Improved</p>
        <p class="text-4xl font-bold text-emerald-600" id="count-improved">0</p>
      </div>
      <div class="bg-white rounded-3xl border border-rose-100 shadow-sm p-6">
        <p class="text-sm text-slate-500 font-medium">Markers Regressed</p>
        <p class="text-4xl font-bold text-rose-600" id="count-regressed">0</p>
      </div>
      <div class="bg-white rounded-3xl border border-slate-200 shadow-sm p-6">
        <p class="text-sm text-slate-500 font-medium">Markers Stable</p>
        <p class="text-4xl font-bold text-slate-700" id="count-stable">0</p>
      </div>
    </div>

    <div class="flex gap-2 mb-6 p-1 bg-white border border-slate-100 rounded-2xl shadow-sm w-fit">
      <button onclick="switchTab('action')" id="tab-action" class="tab-active px-5 py-2 rounded-xl text-sm font-semibold">Action Required</button>
      <button onclick="switchTab('optimal')" id="tab-optimal" class="tab-inactive px-5 py-2 rounded-xl text-sm font-semibold">Optimal Ranges</button>
    </div>

    <div id="panel-action" class="columns-1 lg:columns-2 gap-5 space-y-5"></div>
    <div id="panel-optimal" class="panel-hidden columns-1 lg:columns-2 gap-5 space-y-5"></div>
  </main>

  <script>
    const STATUS_META = {
      CRITICAL:      { label: "Critical",     bg: "bg-rose-100",   text: "text-rose-700",   border: "border-rose-200",  dot: "bg-rose-500"   },
      HIGH_CLINICAL: { label: "High",          bg: "bg-rose-50",    text: "text-rose-700",   border: "border-rose-100",  dot: "bg-rose-400"   },
      HIGH_ATHLETIC: { label: "Elevated",      bg: "bg-amber-50",   text: "text-amber-700",  border: "border-amber-100", dot: "bg-amber-400"  },
      LOW_CLINICAL:  { label: "Low",           bg: "bg-amber-50",   text: "text-amber-700",  border: "border-amber-100", dot: "bg-amber-400"  },
      LOW_ATHLETIC:  { label: "Sub-Optimal",   bg: "bg-amber-50",   text: "text-amber-700",  border: "border-amber-100", dot: "bg-amber-400"  },
      OPTIMAL:       { label: "Optimal",       bg: "bg-emerald-50", text: "text-emerald-700",border: "border-emerald-100",dot: "bg-emerald-400"},
    };

    function switchTab(tab) {
      ['action','optimal'].forEach(t => {
        document.getElementById(`panel-${t}`).classList.toggle('panel-hidden', t !== tab);
        document.getElementById(`tab-${t}`).className = t === tab ? 'tab-active px-5 py-2 rounded-xl text-sm font-semibold' : 'tab-inactive px-5 py-2 rounded-xl text-sm font-semibold';
      });
    }

    function makeRangeBar(value, min, max) {
      const clamped = Math.max(min, Math.min(max, value));
      const pct = ((clamped - min) / (max - min)) * 100;
      const color = (value < min || value > max) ? 'bg-rose-400' : 'bg-indigo-500';
      return `<div class="h-1 mt-2 rounded bg-slate-200 overflow-hidden"><div class="h-full rounded ${color}" style="width:${pct}%"></div></div>
              <div class="flex justify-between text-[10px] text-slate-400 mt-1"><span>${min}</span><span>${max}</span></div>`;
    }

    function buildCard(bm, deltaData) {
      const meta = STATUS_META[bm.status] || STATUS_META.OPTIMAL;
      
      let deltaHTML = "";
      if (deltaData) {
        const isPos = deltaData.delta > 0;
        let dColor = "text-slate-600 bg-slate-100", dIcon = "fa-minus";
        if(deltaData.trajectory === "IMPROVED") { dColor = "text-emerald-700 bg-emerald-100"; dIcon = "fa-arrow-trend-up"; }
        if(deltaData.trajectory === "REGRESSED") { dColor = "text-rose-700 bg-rose-100"; dIcon = "fa-arrow-trend-down"; }
        
        deltaHTML = `
          <div class="mt-2 flex items-center justify-end gap-2">
            <span class="text-xs text-slate-400">Baseline: ${deltaData.baseline_val}</span>
            <span class="text-xs font-bold px-2 py-0.5 rounded ${dColor}">
              <i class="fa-solid ${dIcon} mr-1"></i>${isPos ? '+' : ''}${deltaData.delta}
            </span>
          </div>`;
      }

      const actionsHtml = bm.supplement_actions.map(a => `
        <div class="bg-slate-50 rounded-xl p-3 mt-2 border border-slate-100">
          <div class="flex justify-between"><span class="text-xs font-semibold">${a.supplement}</span><span class="text-xs font-bold text-indigo-600">${a.action_type}</span></div>
          <p class="text-xs text-slate-500 mt-1">${a.warning_text}</p>
          <div class="bg-white px-2 py-1 mt-2 rounded border text-sm font-semibold">${a.output}</div>
        </div>`).join('');

      return `
        <div class="bg-white rounded-[1.5rem] border ${meta.border} shadow-sm p-6 break-inside-avoid">
          <div class="flex justify-between mb-2">
            <div>
              <span class="text-[10px] font-bold uppercase tracking-wider ${meta.text} ${meta.bg} px-2 py-1 rounded-full">${meta.label}</span>
              <h3 class="text-lg font-bold mt-2">${bm.marker}</h3>
            </div>
            <div class="text-right">
              <p class="text-3xl font-bold">${bm.value}</p>
              <p class="text-xs text-slate-400">${bm.unit}</p>
              ${deltaHTML}
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="bg-slate-50 p-3 rounded-xl"><p class="text-xs text-slate-500">Athletic Range</p>${makeRangeBar(bm.value, bm.athletic_min, bm.athletic_max)}</div>
            <div class="bg-slate-50 p-3 rounded-xl"><p class="text-xs text-slate-500">Clinical Range</p>${makeRangeBar(bm.value, bm.clinical_min, bm.clinical_max)}</div>
          </div>
          ${actionsHtml ? `<div class="border-t border-slate-100 pt-3"><p class="text-xs font-bold text-slate-400">SUPPLEMENT ACTIONS</p>${actionsHtml}</div>` : ''}
        </div>`;
    }

    window.addEventListener('DOMContentLoaded', () => {
      const rawComparison = localStorage.getItem('bioaudit_comparison');
      if (!rawComparison) return window.location.href = 'compare.html';

      const data = JSON.parse(rawComparison);

      document.getElementById('count-improved').textContent = data.summary.improvements;
      document.getElementById('count-regressed').textContent = data.summary.regressions;
      document.getElementById('count-stable').textContent = data.summary.stable;

      const actPanel = document.getElementById('panel-action');
      const optPanel = document.getElementById('panel-optimal');
      
      data.current_audit.biomarker_analysis.forEach(bm => {
        const dMatch = data.comparison.find(d => d.marker === bm.marker);
        if (bm.status === 'OPTIMAL') {
            optPanel.innerHTML += buildCard(bm, dMatch);
        } else {
            actPanel.innerHTML += buildCard(bm, dMatch);
        }
      });

      const syncPayload = { 
          status: "success", 
          audit: data.current_audit 
      };
      localStorage.setItem('bioaudit_results', JSON.stringify(syncPayload));
    });
  </script>
</body>
</html>
